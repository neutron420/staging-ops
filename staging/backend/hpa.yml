apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devix-backend-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devix-backend-staging
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
