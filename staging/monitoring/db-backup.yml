apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: default
spec:
  schedule: "0 0 * * *" 
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:17-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  # Install AWS CLI
                  apk add --no-cache aws-cli
                  
                  # Create backup
                  DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  FILENAME="backup-$DATE.sql"
                  echo "Starting backup of database..."
                  pg_dump $DATABASE_URL > /tmp/$FILENAME
                  
                  # Check if file is not empty
                  if [ ! -s /tmp/$FILENAME ]; then
                    echo "Error: Backup file is empty!"
                    exit 1
                  fi
                  
                  # Upload to R2 using AWS CLI
                  echo "Uploading $FILENAME to R2..."
                  AWS_ACCESS_KEY_ID=$R2_ACCESS_KEY \
                  AWS_SECRET_ACCESS_KEY=$R2_SECRET_KEY \
                  aws s3 cp /tmp/$FILENAME s3://$R2_BUCKET_NAME/backups/$FILENAME --endpoint-url $R2_ENDPOINT
                  
                  echo "Backup completed successfully!"
              envFrom:
                - secretRef:
                    name: devix-staging-secret
          restartPolicy: OnFailure
