apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-staging
spec:
  serviceName: "postgres-staging"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-staging
  template:
    metadata:
      labels:
        app: postgres-staging
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: devix_staging
            - name: POSTGRES_USER
              value: devix_user
            - name: POSTGRES_PASSWORD
              value: devix_password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-staging
spec:
  selector:
    app: postgres-staging
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
