apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devix-staging
spec:
  destination:
    name: ''
    namespace: 'default'
    server: https://kubernetes.default.svc
  source:
    path: staging/devix
    repoURL: https://github.com/neutron420/staging-ops.git
    targetRevision: HEAD
    directory:
      recurse: false
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
