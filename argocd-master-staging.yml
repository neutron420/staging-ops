apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devix-master-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/neutron420/staging-ops.git
    targetRevision: HEAD
    path: staging
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
