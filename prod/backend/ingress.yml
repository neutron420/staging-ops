apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devix-backend-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.devix.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devix-backend-prod
                port:
                  number: 80
