# Production Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devix-backend-prod
  labels:
    app: devix-backend-prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app: devix-backend-prod
  template:
    metadata:
      labels:
        app: devix-backend-prod
    spec:
      containers:
        - name: backend
          image: neutron420/devix:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: devix-prod-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: devix-backend-prod
spec:
  selector:
    app: devix-backend-prod
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
